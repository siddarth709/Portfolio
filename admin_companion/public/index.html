<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Admin</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts (Exact Match) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <!-- SweetAlert2 (Dark Theme) -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

    <style>
        :root {
            /* Colors from global.css */
            --color-bg-main: #0a0a0a;
            --color-bg-secondary: #111111;
            --color-text-main: #ffffff;
            --color-text-secondary: #888888;
            --color-accent: #00f0ff;
            --color-border: #333333;

            /* Fonts */
            --font-main: 'Outfit', sans-serif;
            --font-display: 'Rajdhani', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--color-bg-main);
            color: var(--color-text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* Sidebar */
        aside {
            background-color: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border);
        }

        .sidebar-link {
            @apply flex items-center px-6 py-4 md:py-3 transition-all cursor-pointer border-l-4 border-transparent text-lg md:text-base;
            color: var(--color-text-secondary);
        }

        .sidebar-link:hover {
            color: var(--color-text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-link.active {
            color: var(--color-accent);
            border-color: var(--color-accent);
            background: rgba(0, 240, 255, 0.05);
        }

        /* Glass Card (Matching Site) */
        .glass-card {
            background: rgba(17, 17, 17, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Buttons */
        .btn-primary {
            background: rgba(0, 240, 255, 0.15);
            color: var(--color-accent);
            border: 1px solid rgba(0, 240, 255, 0.5);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* Inputs */
        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-border);
            color: white;
            padding: 0.8rem;
            border-radius: 6px;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        /* File Input */
        .file-input-wrapper {
            border: 2px dashed var(--color-border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            transition: 0.2s;
        }

        .file-input-wrapper:hover {
            border-color: var(--color-accent);
            background: rgba(0, 240, 255, 0.05);
        }

        /* Typography */
        h1,
        h2,
        h3 {
            font-family: var(--font-display);
        }

        /* Login Overlay */
        #loginOverlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        /* SweetAlert Customization */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #111;
            border: 1px solid #333;
        }

        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background-color: var(--color-accent) !important;
            color: #000 !important;
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 10px;
        }

        /* Logic for Mobile Sidebar */
        aside {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="glass-card w-full max-w-md text-center mx-4 p-8">
            <h1 class="text-3xl font-bold mb-2 text-white">ADMIN<span class="text-[--color-accent]">+</span></h1>
            <p class="text-gray-400 mb-8">Secure Access Required</p>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="loginPassword" placeholder="Enter Password..."
                    class="input-field text-center text-lg tracking-widest" required>
                <button type="submit" class="btn-primary w-full py-3">Unlocking...</button>
            </form>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden">Invalid Password</p>
        </div>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobileBackdrop" class="fixed inset-0 bg-black/80 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed md:static inset-y-0 left-0 z-40 w-72 flex-shrink-0 flex flex-col transform -translate-x-full md:translate-x-0 h-full">
        <div class="p-6 border-b border-[--color-border] pt-10 md:pt-6">
            <h1 class="text-2xl font-bold tracking-wide text-white">SIDDARTH<span class="text-[--color-accent]">.</span>
            </h1>
            <p class="text-xs text-[--color-text-secondary] mt-1 font-[--font-main] uppercase tracking-wider">Admin
                Console</p>
            <button onclick="toggleSidebar()" class="md:hidden absolute top-6 right-6 text-gray-500"><i
                    class="fas fa-times text-xl"></i></button>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 space-y-1 custom-scrollbar">
            <!-- Links injected by JS or static -->
            <div onclick="router('dashboard'); toggleSidebarUI()" class="sidebar-link active" data-target="dashboard"><i
                    class="fas fa-th-large w-6"></i> Dashboard</div>
            <div onclick="router('projects'); toggleSidebarUI()" class="sidebar-link" data-target="projects"><i
                    class="fas fa-code w-6"></i> Projects</div>
            <div onclick="router('testimonials'); toggleSidebarUI()" class="sidebar-link" data-target="testimonials"><i
                    class="fas fa-quote-right w-6"></i> Testimonials</div>
            <div onclick="router('experience'); toggleSidebarUI()" class="sidebar-link" data-target="experience"><i
                    class="fas fa-briefcase w-6"></i> Experience</div>
            <div onclick="router('education'); toggleSidebarUI()" class="sidebar-link" data-target="education"><i
                    class="fas fa-graduation-cap w-6"></i> Education</div>
            <div onclick="router('skills'); toggleSidebarUI()" class="sidebar-link" data-target="skills"><i
                    class="fas fa-layer-group w-6"></i> Skills</div>
            <div onclick="router('certificates'); toggleSidebarUI()" class="sidebar-link" data-target="certificates"><i
                    class="fas fa-certificate w-6"></i> Certifications</div>
            <div onclick="router('research'); toggleSidebarUI()" class="sidebar-link" data-target="research"><i
                    class="fas fa-flask w-6"></i> Research</div>
            <div onclick="router('messages'); toggleSidebarUI()" class="sidebar-link" data-target="messages"><i
                    class="fas fa-envelope w-6"></i> Messages</div>
        </nav>

        <div class="p-4 border-t border-[--color-border]">
            <button onclick="logout()"
                class="w-full text-left px-4 py-3 text-red-400 hover:text-red-300 hover:bg-white/5 rounded-lg transition-colors flex items-center gap-3">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Mobile Header -->
        <header
            class="bg-[--color-bg-secondary] border-b border-[--color-border] p-4 flex justify-between items-center md:hidden z-20">
            <h1 class="font-bold text-lg text-white">DASHBOARD</h1>
            <button onclick="toggleSidebar()" class="text-white p-2"><i class="fas fa-bars text-xl"></i></button>
        </header>

        <!-- View Container -->
        <div id="viewContainer" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">

            <div id="dashboard" class="view-section">
                <h2 class="text-3xl font-bold mb-6">Overview</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 text-white">
                    <!-- Stats -->
                </div>
                <div class="glass-card">
                    <p class="text-gray-400 text-sm"><i class="fas fa-circle text-green-500 text-[10px] mr-2"></i>
                        System Online. Auto-Git Sync Active.</p>
                </div>
            </div>

            <div id="dynamicContent" class="hidden pb-20">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="pageTitle" class="text-3xl font-bold text-white capitalize">Section</h2>
                    <button id="addBtn" class="btn-primary" onclick="openModal('add')">
                        <i class="fas fa-plus"></i> <span class="hidden md:inline ml-2">Add New</span>
                    </button>
                </div>
                <div id="contentList" class="grid gap-6"></div>
            </div>

        </div>
    </main>

    <!-- Modal Form -->
    <div id="modalOverlay"
        class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-0 md:p-4 backdrop-blur-sm">
        <div
            class="glass-card w-full max-w-lg max-h-[90vh] flex flex-col m-0 rounded-none md:rounded-xl h-full md:h-auto bg-[#111]">
            <div class="p-4 border-b border-[--color-border] flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-white">Edit Item</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>

            <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                <form id="dynamicForm" class="space-y-4">
                    <!-- Fields -->
                </form>
            </div>

            <div class="p-4 border-t border-[--color-border] flex justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2 text-gray-400 hover:text-white">Cancel</button>
                <button form="dynamicForm" type="submit" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
