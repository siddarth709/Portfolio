<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>

    <nav class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo display-text">PORTFOLIO<span class="text-accent">.</span></a>

            <button class="mobile-nav-toggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>

            <div class="nav-links">
                <a href="{{ url_for('projects') }}">Projects</a>
                <a href="{{ url_for('certifications') }}">Certifications</a>
                <a href="{{ url_for('research') }}">Research</a>
                <a href="{{ url_for('testimonials_page') }}">Testimonials</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Portfolio. <span class="text-accent">N S Siddarth</span>.</p>
            {% if request.endpoint == 'index' %}
            <p style="margin-top: 0.5rem;"><a href="{{ url_for('login') }}"
                    style="color: var(--color-text-secondary); font-size: 0.8rem; text-decoration: none;">Admin
                    Login</a></p>
            {% endif %}
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Check for Flask Flash Messages and trigger SweetAlert2 Toasts
        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        const Toast = Swal.mixin({
            toast: true,
            position: "top-end",
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.onmouseenter = Swal.stopTimer;
                toast.onmouseleave = Swal.resumeTimer;
            }
        });

        {% for category, message in messages %}
        Toast.fire({
            icon: "{{ 'success' if category == 'success' else 'error' }}",
            title: "{{ message }}"
        });
        {% endfor %}
        {% endif %}
        {% endwith %}
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
