{% extends "base.html" %}

{% block title %}Portfolio | Home{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
{% endblock %}

{% block content %}
<section class="hero">
    <div class="container">
        <div class="hero-content">
            <h1 class="display-text slide-up">
                {{ home.hero_text_1 }} <br>
                <span class="text-accent">{{ home.hero_text_accent }}</span> <br>
                {{ home.hero_text_2 }}
            </h1>
            <p class="hero-subtitle fade-in">
                {{ home.subtitle }}
            </p>
            <div class="hero-actions fade-in">
                <a href="{{ url_for('projects') }}" class="btn btn-primary">View Projects</a>
                <a href="{{ url_for('contact') }}" class="btn btn-outline">Contact Me</a>
            </div>
        </div>
    </div>
    <div class="hero-background"></div>
</section>


{% endblock %}
